{% extends 'base.html' %}

{% block title %}Register - CareerAI{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center py-5">
        <div class="col-md-6 col-lg-5">
            <div class="glass-card p-5 border-secondary">
                <div class="text-center mb-4">
                    <h2 class="fw-bold font-heading">Create Account</h2>
                    <p class="text-secondary small">Get started on your career analytics profile</p>
                </div>
                
                <form id="register-form" action="{{ url_for('auth.register') }}" method="POST">
                    <div class="mb-3">
                        <label for="full_name" class="form-label text-secondary small">Full Name</label>
                        <input type="text" class="form-control form-glass" id="full_name" name="full_name" placeholder="John Doe" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label text-secondary small">Email address</label>
                        <input type="email" class="form-control form-glass" id="email" name="email" placeholder="name@example.com" required autocomplete="username">
                    </div>
                    <div class="mb-3">
                        <label for="role" class="form-label text-secondary small">Register As</label>
                        <select class="form-select form-glass" id="role" name="role">
                            <option value="student" selected>Student / Candidate</option>
                            <option value="admin">Administrator</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label text-secondary small">Password</label>
                        <input type="password" class="form-control form-glass" id="password" name="password" placeholder="••••••••" required autocomplete="new-password">
                    </div>
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label text-secondary small">Confirm Password</label>
                        <input type="password" class="form-control form-glass" id="confirm_password" name="confirm_password" placeholder="••••••••" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn gradient-btn w-100 py-3 mt-2">Create Account</button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="text-secondary small mb-0">Already have an account? <a href="{{ url_for('auth.login') }}" class="text-primary text-decoration-none fw-semibold">Sign In here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
