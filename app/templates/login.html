{% extends 'base.html' %}

{% block title %}Sign In - CareerAI{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center py-3 py-md-5">
        <div class="col-11 col-sm-9 col-md-6 col-lg-5">
            <div class="glass-card p-4 p-md-5 border-secondary">
                <div class="text-center mb-4">
                    <h2 class="fw-bold font-heading">Welcome Back</h2>
                    <p class="text-secondary small">Access your career advisor dashboard</p>
                </div>
                
                <form id="login-form" action="{{ url_for('auth.login') }}" method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label text-secondary small">Email address</label>
                        <input type="email" class="form-control form-glass" id="email" name="email" placeholder="name@example.com" required autocomplete="username">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label text-secondary small">Password</label>
                        <input type="password" class="form-control form-glass" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn gradient-btn w-100 py-3 mt-2">Sign In</button>
                </form>

                <div class="text-center mt-4">
                    <p class="text-secondary small mb-0">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-primary text-decoration-none fw-semibold">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
